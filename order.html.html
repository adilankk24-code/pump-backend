  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r] { -moz-appearance:textfield; }\n  a { color:#8a7bff; } a:hover { color:#a99bff; }\n  @keyframes pop { 0%{ transform:scale(.7); opacity:0; } 60%{ transform:scale(1.08); } 100%{ transform:scale(1); opacity:1; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:440px; margin:0 auto; min-height:100vh; background:#0c0e13; color:#e7eaf0; font-family:'IBM Plex Sans Thai',sans-serif; display:flex; flex-direction:column;\">\n\n  <!-- ===== FORM VIEW ===== -->\n  <sc-if value=\"{{ formView }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"flex:1; display:flex; flex-direction:column;\">\n\n    <!-- sheet handle + tg header -->\n    <div style=\"position:sticky; top:0; z-index:10; background:rgba(12,14,19,.92); backdrop-filter:blur(10px); border-bottom:1px solid #1a1f28;\">\n      <div style=\"display:flex; justify-content:center; padding:9px 0 4px;\"><div style=\"width:38px; height:5px; border-radius:3px; background:#2a303b;\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:11px; padding:6px 18px 14px;\">\n        <div style=\"width:38px; height:38px; border-radius:11px; background:linear-gradient(135deg,#7c5cff,#c86bff); display:flex; align-items:center; justify-content:center; font-size:19px; box-shadow:0 6px 18px -4px rgba(124,92,255,.6);\">🚀<\u002Fdiv>\n        <div style=\"flex:1; min-width:0;\">\n          <div style=\"font-weight:700; font-size:16px; line-height:1.1;\">เพิ่มออเดอร์<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#6b7484;\">ส่งเข้าระบบ PumpDesk<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ adminShow }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:7px; background:#12161e; border:1px solid #1e2530; padding:6px 10px; border-radius:20px;\">\n            <span style=\"width:7px; height:7px; border-radius:50%; background:#4ee39a;\"><\u002Fspan>\n            <span style=\"font-size:12px; color:#c3cad6; font-weight:500; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ adminName }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1; padding:18px 18px 26px; display:flex; flex-direction:column; gap:18px;\">\n\n      <!-- platform chips -->\n      <div>\n        <label style=\"font-size:12.5px; color:#8b93a3; display:block; margin-bottom:9px; font-weight:500;\">แพลตฟอร์ม<\u002Flabel>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:8px;\">\n          <sc-for list=\"{{ platformChips }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">\n              <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; line-height:1;\">{{ p.icon }}<\u002Fspan>\n              <span style=\"font-size:11px; font-weight:500;\">{{ p.name }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- service chips -->\n      <div>\n        <label style=\"font-size:12.5px; color:#8b93a3; display:block; margin-bottom:9px; font-weight:500;\">บริการ<\u002Flabel>\n        <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n          <sc-for list=\"{{ serviceChips }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ s.onClick }}\" style=\"{{ s.style }}\">{{ s.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- qty + price -->\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px;\">\n        <div>\n          <label style=\"font-size:12.5px; color:#8b93a3; display:block; margin-bottom:8px; font-weight:500;\">🔢 ยอดสั่ง<\u002Flabel>\n          <input value=\"{{ form.qty }}\" onchange=\"{{ setQty }}\" type=\"number\" inputmode=\"numeric\" placeholder=\"1000\" style=\"width:100%; background:#12161e; border:1px solid #262d3a; color:#e7eaf0; padding:14px 15px; border-radius:13px; font-size:16px; font-family:'Space Grotesk',sans-serif;\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-size:12.5px; color:#8b93a3; display:block; margin-bottom:8px; font-weight:500;\">💰 ราคา (บาท)<\u002Flabel>\n          <input value=\"{{ form.price }}\" onchange=\"{{ setPrice }}\" type=\"number\" inputmode=\"numeric\" placeholder=\"150\" style=\"width:100%; background:#12161e; border:1px solid #262d3a; color:#e7eaf0; padding:14px 15px; border-radius:13px; font-size:16px; font-family:'Space Grotesk',sans-serif;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- qty quick presets -->\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:-6px;\">\n        <sc-for list=\"{{ qtyPresets }}\" as=\"q\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ q.onClick }}\" style=\"{{ q.style }}\">{{ q.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- link (optional, typed last) -->\n      <div>\n        <label style=\"font-size:12.5px; color:#8b93a3; display:block; margin-bottom:8px; font-weight:500;\">🔗 ลิ้งเป้าหมาย <span style=\"color:#5b6472; font-weight:400;\">(ไม่บังคับ)<\u002Fspan><\u002Flabel>\n        <div style=\"display:flex; gap:8px;\">\n          <input value=\"{{ form.link }}\" onchange=\"{{ setLink }}\" inputmode=\"url\" placeholder=\"https://...\" style=\"flex:1; min-width:0; background:#12161e; border:1px solid #262d3a; color:#e7eaf0; padding:14px 15px; border-radius:13px; font-size:14px;\">\n          <button onclick=\"{{ pasteLink }}\" style=\"flex-shrink:0; background:#1a2130; color:#c4b8ff; border:1px solid #2c3446; padding:0 15px; border-radius:13px; font-size:13px; font-weight:600; cursor:pointer;\">📋 วาง<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- live summary -->\n      <div style=\"background:linear-gradient(160deg,#141a24,#11151d); border:1px solid #1e2530; border-radius:16px; padding:16px 17px;\">\n        <div style=\"font-size:11.5px; color:#6b7484; margin-bottom:11px; display:flex; align-items:center; gap:7px; font-weight:600; letter-spacing:.3px;\">📥 สรุปที่จะบันทึก<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:9px; font-size:13.5px;\">\n          <div style=\"display:flex; justify-content:space-between; gap:10px;\"><span style=\"color:#6b7484;\">บริการ<\u002Fspan><span style=\"text-align:right;\"><span style=\"color:{{ sumColor }};\">●<\u002Fspan> {{ sumService }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:10px;\"><span style=\"color:#6b7484;\">ยอดสั่ง<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;\">{{ sumQty }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; gap:10px; border-top:1px solid #1e2530; padding-top:9px; margin-top:1px;\"><span style=\"color:#6b7484;\">ราคา<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; color:#4ee39a; font-size:16px;\">฿{{ sumPrice }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ errShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:12.5px; padding:11px 14px; border-radius:12px; background:#3a1a1a; color:#ff8a8a; line-height:1.5;\">⚠️ {{ err }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- sticky submit (shown in normal browser; in Telegram the native MainButton is used) -->\n    <sc-if value=\"{{ showOwnButton }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:sticky; bottom:0; padding:14px 18px calc(16px + env(safe-area-inset-bottom)); background:linear-gradient(180deg,rgba(12,14,19,0),#0c0e13 34%); \">\n        <button onclick=\"{{ submit }}\" style=\"width:100%; background:linear-gradient(135deg,#7c5cff,#a45cff); color:#fff; border:none; padding:16px; border-radius:15px; font-weight:700; font-size:16px; cursor:pointer; box-shadow:0 10px 26px -8px rgba(124,92,255,.7); display:flex; align-items:center; justify-content:center; gap:9px;\">\n          <span style=\"font-size:17px;\">✈️<\u002Fspan> บันทึก &amp; ส่งเข้าระบบ\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== SUCCESS VIEW ===== -->\n  <sc-if value=\"{{ savedView }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 26px; text-align:center;\">\n    <div style=\"width:92px; height:92px; border-radius:50%; background:linear-gradient(135deg,#12321f,#0f2a1a); border:1px solid #1e5c3a; display:flex; align-items:center; justify-content:center; font-size:46px; animation:pop .45s cubic-bezier(.2,.9,.3,1.2) both; box-shadow:0 14px 40px -10px rgba(78,227,154,.4);\">✅<\u002Fdiv>\n    <div style=\"font-size:22px; font-weight:700; margin-top:22px;\">บันทึกออเดอร์แล้ว!<\u002Fdiv>\n    <div style=\"font-size:13.5px; color:#8b93a3; margin-top:7px; line-height:1.6; max-width:280px;\">{{ savedMsg }}<\u002Fdiv>\n\n    <div style=\"width:100%; max-width:340px; background:#12161e; border:1px solid #1e2530; border-radius:16px; padding:16px 17px; margin-top:24px; text-align:left;\">\n      <div style=\"display:flex; flex-direction:column; gap:9px; font-size:13.5px;\">\n        <div style=\"display:flex; justify-content:space-between; gap:10px;\"><span style=\"color:#6b7484;\">บริการ<\u002Fspan><span><span style=\"color:{{ sumColor }};\">●<\u002Fspan> {{ sumService }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:10px;\"><span style=\"color:#6b7484;\">ยอดสั่ง<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;\">{{ sumQty }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; justify-content:space-between; gap:10px; border-top:1px solid #1e2530; padding-top:9px;\"><span style=\"color:#6b7484;\">ราคา<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; color:#4ee39a;\">฿{{ sumPrice }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ newOrder }}\" style=\"margin-top:24px; background:#12161e; color:#c4b8ff; border:1px solid #2c3446; padding:13px 26px; border-radius:13px; font-weight:600; font-size:14.5px; cursor:pointer; display:flex; align-items:center; gap:8px;\"><span style=\"font-size:16px;\">＋<\u002Fspan> เพิ่มออเดอร์อีก<\u002Fbutton>\n    <sc-if value=\"{{ inTelegram }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-size:12px; color:#6b7484; margin-top:14px;\">หน้าต่างนี้จะปิดอัตโนมัติ…<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = {\n    form: { customer:'', platform:'Facebook', service:'เพิ่มผู้ติดตาม', link:'', qty:'', price:'' },\n    saved: false,\n    savedMsg: '',\n    err: '',\n    adminName: '',\n    inTelegram: false,\n  };\n\n  PLATFORMS = {\n    'Facebook': { color:'#4a8bff', icon:'f' },\n    'Instagram': { color:'#e756a5', icon:'IG' },\n    'TikTok': { color:'#37e6d9', icon:'TT' },\n    'YouTube': { color:'#ff5b5b', icon:'YT' },\n  };\n  SERVICES = {\n    'Facebook': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดแชร์'],\n    'Instagram': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดรีโพส'],\n    'TikTok': ['เพิ่มผู้ติดตาม','เพิ่มไลค์โพส','ยอดวิว','ยอดรีโพส'],\n    'YouTube': ['เพิ่มผู้ติดตาม','เพิ่มไลค์คลิป','ยอดวิว','ยอดแชร์'],\n  };\n\n  componentDidMount() {\n    const tg = window.Telegram && window.Telegram.WebApp;\n    if (tg && tg.initData !== undefined) {\n      try { tg.ready(); tg.expand(); } catch(e){}\n      try { tg.setHeaderColor && tg.setHeaderColor('#0c0e13'); tg.setBackgroundColor && tg.setBackgroundColor('#0c0e13'); } catch(e){}\n      const u = tg.initDataUnsafe && tg.initDataUnsafe.user;\n      const name = u ? (u.username ? '@'+u.username : [u.first_name,u.last_name].filter(Boolean).join(' ')) : '';\n      this.tg = tg;\n      this.setState({ inTelegram:true, adminName:name });\n      this.setupMainButton();\n    }\n  }\n\n  setupMainButton() {\n    const tg = this.tg; if (!tg || !tg.MainButton) return;\n    try {\n      tg.MainButton.setText('บันทึก & ส่งเข้าระบบ');\n      tg.MainButton.color = '#7c5cff';\n      tg.MainButton.textColor = '#ffffff';\n      tg.MainButton.show();\n      if (this._mbHandler) tg.MainButton.offClick(this._mbHandler);\n      this._mbHandler = () => this.submit();\n      tg.MainButton.onClick(this._mbHandler);\n    } catch(e){}\n  }\n\n  fmt(n){ return Number(n||0).toLocaleString('en-US'); }\n\n  saveOrder(order) {\n    let user = null;\n    try { user = localStorage.getItem('pumpdesk_session_v1'); } catch(e){}\n    const key = user ? ('pumpdesk_orders_v1_' + user) : 'pumpdesk_orders_v1_telegram';\n    let arr = [];\n    try { arr = JSON.parse(localStorage.getItem(key)) || []; } catch(e){}\n    arr.push(order);\n    try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e){}\n    return user;\n  }\n\n  submit() {\n    const f = this.state.form;\n    if (!(Number(f.price) > 0)) { this.hapticErr(); return this.setState({ err:'กรุณากรอกราคา' }); }\n\n    const order = {\n      id: Date.now(),\n      customer: 'ไม่ระบุ',\n      platform: f.platform,\n      service: f.service || (this.SERVICES[f.platform]||[''])[0],\n      link: f.link.trim(),\n      qty: Number(f.qty) || 0,\n      price: Number(f.price) || 0,\n      status: 'รอทำ',\n      date: new Date().toISOString().slice(0,10),\n      source: 'telegram',\n    };\n\n    const user = this.saveOrder(order);\n\n    // Send back to the bot so a real backend can record it too\n    if (this.tg && this.tg.sendData) {\n      try { this.tg.sendData(JSON.stringify({ type:'new_order', order })); } catch(e){}\n    }\n    if (this.tg && this.tg.HapticFeedback) { try { this.tg.HapticFeedback.notificationOccurred('success'); } catch(e){} }\n    if (this.tg && this.tg.MainButton) { try { this.tg.MainButton.hideProgress(); this.tg.MainButton.hide(); } catch(e){} }\n\n    const savedMsg = this.state.inTelegram\n      ? 'ส่งออเดอร์เข้าบอทและบันทึกในระบบเรียบร้อย'\n      : (user ? ('บันทึกเข้าบัญชี ' + user + ' แล้ว — เปิดหน้าหลังบ้านเพื่อดูออเดอร์นี้')\n              : 'บันทึกในเครื่องแล้ว (ยังไม่ได้ล็อกอินหลังบ้าน)');\n\n    this.setState({ saved:true, savedMsg, err:'' });\n\n    // auto-close inside Telegram\n    if (this.tg && this.tg.close) { setTimeout(()=>{ try { this.tg.close(); } catch(e){} }, 2200); }\n  }\n\n  hapticErr() {\n    if (this.tg && this.tg.HapticFeedback) { try { this.tg.HapticFeedback.notificationOccurred('error'); } catch(e){} }\n  }\n\n  newOrder() {\n    this.setState({ saved:false, err:'', form:{ customer:'', platform:'Facebook', service:'เพิ่มผู้ติดตาม', link:'', qty:'', price:'' } });\n    if (this.tg) this.setupMainButton();\n  }\n\n  async pasteLink() {\n    try { const t = await navigator.clipboard.readText(); if (t) this.setState({ form:{...this.state.form, link:t.trim()} }); } catch(e){}\n  }\n\n  renderVals() {\n    const f = this.state.form;\n    const P = this.PLATFORMS;\n    const svc = f.service || (this.SERVICES[f.platform]||[''])[0];\n    const pColor = (P[f.platform]||{}).color || '#888';\n\n    const platformChips = Object.keys(P).map(name => {\n      const active = f.platform === name;\n      const c = P[name].color;\n      return {\n        name, icon: P[name].icon,\n        onClick: () => this.setState({ form:{...this.state.form, platform:name, service:(this.SERVICES[name]||[''])[0]}, err:'' }),\n        style: `display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:11px 4px; border-radius:13px; cursor:pointer; font-family:inherit; color:${active?c:'#8b93a3'}; background:${active?c+'22':'#12161e'}; border:1.5px solid ${active?c:'#232a36'};`\n      };\n    });\n\n    const serviceChips = (this.SERVICES[f.platform]||[]).map(name => {\n      const active = svc === name;\n      return {\n        name,\n        onClick: () => this.setState({ form:{...this.state.form, service:name}, err:'' }),\n        style: `padding:10px 15px; border-radius:11px; cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:500; color:${active?'#c4b8ff':'#8b93a3'}; background:${active?'#7c5cff22':'#12161e'}; border:1.5px solid ${active?'#7c5cff':'#232a36'};`\n      };\n    });\n\n    const setField = (k)=>(e)=>this.setState({ form:{...this.state.form,[k]:e.target.value}, err:'' });\n\n    const qtyPresets = [500,1000,5000,10000].map(n => {\n      const active = Number(f.qty) === n;\n      return {\n        label: n>=1000 ? (n/1000)+'K' : String(n),\n        onClick: () => this.setState({ form:{...this.state.form, qty:String(n)}, err:'' }),\n        style: `padding:8px 14px; border-radius:10px; cursor:pointer; font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; color:${active?'#4ee39a':'#8b93a3'}; background:${active?'#12321f':'#12161e'}; border:1.5px solid ${active?'#1e5c3a':'#232a36'};`\n      };\n    });\n\n    return {\n      formView: !this.state.saved,\n      savedView: this.state.saved,\n      form: f,\n      platformChips, serviceChips, qtyPresets,\n      setCustomer: setField('customer'),\n      setLink: setField('link'),\n      setQty: setField('qty'),\n      setPrice: setField('price'),\n      pasteLink: () => this.pasteLink(),\n      submit: () => this.submit(),\n      newOrder: () => this.newOrder(),\n      sumCustomer: f.customer.trim() || '—',\n      sumService: svc,\n      sumColor: pColor,\n      sumQty: f.qty ? this.fmt(f.qty) : '—',\n      sumPrice: this.fmt(f.price),\n      err: this.state.err, errShow: !!this.state.err,\n      adminName: this.state.adminName, adminShow: !!this.state.adminName,\n      inTelegram: this.state.inTelegram,\n      showOwnButton: !this.state.inTelegram,\n      savedMsg: this.state.savedMsg,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
